<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.10.4/gsap.min.js"></script>
    <title>HellO</title>
</head>
<body>
    <main class="flex lg:flex-row flex-col-reverse lg:h-screen w-screen h-auto bg-white overflow-hidden">
        <aside class="shrink-0 lg:w-1/3 w-full bg-yellow-400 relative lg:h-full h-screen">
            <header id="logo" class="swipe-left absolute top-6 left-6 z-50"><img src="src/icons/myLogo.svg" class="lg:w-10 w-10 md:w-16" alt=""></header>
            <div class="profile absolute top-0 left-0 bg-slate-700 w-full h-full"></div>
            <div class="myworks-gallery translate-x-full works h-full flex flex-col items-center overflow-y-scroll overflow-x-hidden bg-yellow-400">
                <div class="card w-full h-1/2 bg-slate-200 shrink-0 overflow-hidden"><a href="#"><img class="w-full h-full object-cover hover:scale-110 transition-all duration-1000 " src="src/images/discounted-item-2.jpg" alt=""></a></div>
                <div class="card w-full h-1/2 bg-slate-200 shrink-0 overflow-hidden"><a href="#"><img class="w-full h-full object-cover hover:scale-110 transition-all duration-1000 " src="src/images/pexels-andrea-piacquadio-3757055.jpg" alt=""></a></div>
                <div class="card w-full h-1/2 bg-slate-200 shrink-0 overflow-hidden"><a href="#"><img class="w-full h-full object-cover hover:scale-110 transition-all duration-1000 " src="src/images/pexels-freemockupsorg-775219.jpg" alt=""></a></div>
                <div class="card w-full h-1/2 bg-slate-200 shrink-0 overflow-hidden"><a href="#"><img class="w-full h-full object-cover hover:scale-110 transition-all duration-1000 " src="src/images/pexels-medhat-ayad-447592.jpg" alt=""></a></div>
            </div>
            <p id="address" class="absolute bottom-6 left-6 lg:text-sm md:text-3xl text-sm font-semibold">Central Java</p>
        </aside>
    
        <div class="showcase shrink-0 lg:w-2/3 w-full h-screen bg-white relative">
            <div class="circle md:w-96 md:h-96 w-80 h-80 rounded-full bg-yellow-400 absolute top-1/2 left-1/2 -translate-y-1/2 -translate-x-1/2 flex items-center justify-center">
                <h1 id="title" class="w-11/12 font-extrabold text-5xl text-center">Make It Simple :)</h1>
            </div>
            <nav class="w-full flex justify-center mt-10">
                <ul class="menu-container flex lg:w-1/3 md:w-3/5 w-4/5 justify-between">
                    <li class="relative"><span class="absolute block bottom-0 left-0 w-full h-1/3 bg-yellow-400 z-0"></span><a href="#" id="home-nav" class="z-10 md:text-2xl text-base lg:text-base relative">Home</a></li>
                    <li class="relative"><span class="hidden absolute block bottom-0 left-0 w-full h-1/3 bg-yellow-400 z-0"></span><a href="pages/about.html" id="about-nav" class="z-10 md:text-2xl text-base lg:text-base relative">About</a></li>
                    <li class="relative"><span class="hidden absolute block bottom-0 left-0 w-full h-1/3 bg-yellow-400 z-0"></span><a href="#" id="works-nav" class="z-10 md:text-2xl text-base lg:text-base relative">Works</a></li>
                    <li class="relative"><span class="hidden absolute block bottom-0 left-0 w-full h-1/3 bg-yellow-400 z-0"></span><a href="pages/blog.html" id="blog-nav" class="z-10 md:text-2xl text-base lg:text-base relative">Blog</a></li>
                </ul>
            </nav>
            <div class="socmed flex md:flex-col justify-between lg:h-1/6 md:h-1/5 absolute md:top-1/2 md:right-10 bottom-8 md:w-auto w-full md:px-0 px-24 md:-translate-y-1/2 md:m-0">
                <img src="src/icons/facebook.svg" alt="" class="lg:w-4 md:w-12  lg:h-4 md:w-12 w-7 h-7">
                <img src="src/icons/google.svg" alt="" class="lg:w-4 md:w-12  lg:h-4 md:w-12 w-7 h-7">
                <img src="src/icons/linkedin.svg" alt="" class="lg:w-4 md:w-12  lg:h-4 md:w-12 w-7 h-7">
            </div>
            <p id="myWorksText" class="lg:block hidden opacity-0 vertical-text absolute top-1/2 left-14 -translate-y-1/2 font-bold text-sm">SCROLL</p>
        </div>
    </main>

    <script src="scripts/script.js"></script>
</body>
</html>
